name: ci
on:
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Build andes
        run: go build -o andes ./cmd/andes
      - name: Run tests
        run: go test ./...
      - name: Validate catalog
        run: ./andes validate --catalog catalog
